name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm --dir frontend/web install --frozen-lockfile

      - name: Install backend dependencies
        run: pnpm --dir backend/server install --frozen-lockfile

      - name: Build frontend
        run: pnpm --dir frontend/web build

      - name: Build backend
        run: pnpm --dir backend/server build
