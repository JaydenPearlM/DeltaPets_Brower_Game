services:
  - type: web
    name: deltapets
    runtime: node
    rootDir: .
    buildCommand: |
      corepack enable
      cd frontend/web
      pnpm install
      pnpm build
      cd ../../backend/server
      pnpm install
      pnpm build
    startCommand: cd backend/server && pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
